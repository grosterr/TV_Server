<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Прапор Співдружності Незалежних Держав (СНД), пропорції 1:2 -->
  <rect width="1200" height="600" fill="#0033A0"/>
  <!-- Емблема: білі смуги, що розкриваються догори, та золоте сонце -->
  <g stroke="#FFFFFF" stroke-width="24" fill="none" stroke-linecap="round">
    <!-- права половина -->
    <path d="M 622 480 L 622 305 Q 622 255 668 228"/>
    <path d="M 668 480 L 668 330 Q 668 285 712 260"/>
    <path d="M 714 480 L 714 355 Q 714 315 756 292"/>
    <path d="M 760 480 L 760 380 Q 760 345 800 324"/>
    <!-- ліва половина (дзеркально) -->
    <path d="M 578 480 L 578 305 Q 578 255 532 228"/>
    <path d="M 532 480 L 532 330 Q 532 285 488 260"/>
    <path d="M 486 480 L 486 355 Q 486 315 444 292"/>
    <path d="M 440 480 L 440 380 Q 440 345 400 324"/>
  </g>
  <!-- сонце -->
  <circle cx="600" cy="168" r="52" fill="#FECB00"/>
</svg>

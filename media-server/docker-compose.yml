# ============================================================================
#  Core stack (no IP hiding). TorrServer publishes its own ports directly.
#  Works with ZERO secrets — good default for a first run.
#
#  Want to hide your IP for P2P via Cloudflare WARP? Use the WARP variant:
#     docker compose -f docker-compose.warp.yml up -d
#  The install script (install.sh / install.bat) picks the right file for you.
#
#  Performance tuning (RAM cache, connection limit, peer port) is applied at
#  runtime by the installer / configure.ps1 via the TorrServer API — see README.
# ============================================================================

services:
  # Pinned to a specific release via ghcr (bundles a compatible binary).
  # Do NOT use yourok/torrserver:latest — its start.sh downloads
  # releases/latest at boot, and MatriX.142 has an open crash bug under load
  # (YouROK/TorrServer#766). Bump TORRSERVER_VERSION in .env once #766 is fixed.
  torrserver:
    image: ghcr.io/yourok/torrserver:${TORRSERVER_VERSION:-MatriX.141.10}
    container_name: torrserver
    ports:
      - "8090:8090"           # web UI / API
      - "42116:42116/tcp"     # BitTorrent peers (incoming)
      - "42116:42116/udp"     # uTP / DHT (UDP)
    volumes:
      - ./torrserver_data:/opt/ts   # config/log/torrents — survives recreation
    environment:
      - TZ=Europe/Kyiv
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    ports:
      - "9117:9117"
    volumes:
      - ./jackett_config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kyiv
    depends_on:
      - flaresolverr
    restart: unless-stopped

  # Solves Cloudflare "challenge" pages so Jackett can index protected
  # trackers (1337x, some RuTracker mirrors, etc.) — this is a big part of
  # why aggregators like JacRed "have more sources". Runs a headless
  # browser, so it wants a few hundred MB RAM.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=info
      - TZ=Europe/Kyiv
    restart: unless-stopped

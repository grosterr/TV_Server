# TorrServer performance settings (RAM cache, connection limit) are applied
# at runtime by configure.ps1 via the TorrServer API — see README.

services:
  torrserver:
    image: yourok/torrserver:latest
    container_name: torrserver
    ports:
      - "8090:8090"           # web UI / API
      - "42116:42116/tcp"     # BitTorrent peers (incoming) — forward on router too
      - "42116:42116/udp"     # uTP / DHT (UDP)
    volumes:
      - ./torrserver_data:/opt/ts/db
    environment:
      - TZ=Europe/Kyiv
    restart: unless-stopped

  jackett:
    image: lscr.io/linuxserver/jackett:latest
    container_name: jackett
    ports:
      - "9117:9117"
    volumes:
      - ./jackett_config:/config
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Kyiv
    restart: unless-stopped
